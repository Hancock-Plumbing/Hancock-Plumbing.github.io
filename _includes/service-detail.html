<section class="section section--reliable">
  <div class="container">
    <div class="row col">
      <h2 class="service-heading">{{ service_heading }}</h2>
    </div>
    <div class="row">
      <div class="col-6">
        <img
          src="{{ service_image }}"
          alt="{{ service_image_alt | default: 'Plumbing Services' }}"
          sizes="(max-width: 768px) 100vw, 50vw"
        />
        {% if service_quotes %}
          {{ service_quotes | md }}
        {% endif %}
      </div>
      <div class="col-6">
        {{ content }}
        <h4 class="reliable__tagline mt-20 text-center" role="presentation">
          {{ company.experience }}
        </h4>
      </div>
    </div>

    <div class="reliable__divider"></div>

    {% if cta %}
    <div class="mt-30 text-center">
      {{ cta | md }}
    </div>
    {% endif %}
  </div>
</section>
