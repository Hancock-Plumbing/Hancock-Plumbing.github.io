{% include 'svg-symbols.html' %}

<header class="header_wrapper header_top-position">
  <div class="header">
    <div class="header_fixed-wrapper">

      <!-- Topbar -->
      <div class="header__item topbar__header">
        <div class="header_fixed-background"></div>
        <div class="container">
          <div class="row">
            <div class="col-10">
              <a class="btn btn_default btn--wrap" href="/contact/">
                {{ company.service_area_short }}
              </a>
            </div>
            <div class="col-2 text-right">
              <nav class="social__box" aria-label="Social">
                <div class="soc soc_block">
                  <a class="soc__link" href="{{ company.social.facebook }}" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                    <i class="icon soc__icon fb _dark">
                      <svg><use href="#templates/_global/social/facebook"></use></svg>
                    </i>
                  </a>
                </div>
              </nav>
            </div>
          </div>
        </div>
      </div>

      <!-- Main header -->
      <div class="header__item main__header">
        <div class="header_fixed-background"></div>
        <div class="container">
          <div class="row">
            <div class="col-4 header-logo crop-mode__contain">
              <div class="logo__box logo_can-pressed">
                <div class="logo__wrap">
                  <a href="/" class="logo__link">
                    <div class="crop cropped-image image-loaded mode_contain">
                      <div class="crop__content">
                        <img class="crop-image" alt="{{ company.name }}" src="/images/logo.png" />
                      </div>
                    </div>
                  </a>
                </div>
              </div>
            </div>
            <div class="col-4 header-cta-col">
              <div class="buttons__box">
                <div class="btn__wrap">
                  <a class="btn btn_default header-cta effect-shadow" href="/contact/">
                    <span>CALL US TODAY!</span>
                    <svg class="header-cta-arrow" viewBox="0 0 32 32" width="18" height="18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                      <path d="M24 18L2 18V14L24 14L19 8H23.5L30 16L23.5 24H19L24 18Z"></path>
                    </svg>
                  </a>
                </div>
              </div>
            </div>
            <div class="col-4 header-cta-col">
              <div class="buttons__box">
                <div class="btn__wrap">
                  <a class="btn btn_default header-cta header-cta--phone effect-glow" href="tel:{{ company.phone_link }}">
                    <span>{{ company.phone_display }}</span>
                  </a>
                </div>
              </div>
            </div>
            <button
              type="button"
              id="burger__box"
              class="burger__box nav__effect_1 left"
              aria-label="Open menu"
              aria-expanded="false"
              aria-controls="mobile-nav"
            >
              <div class="btn__burger-wrap">
                <span class="btn__burger">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Subheader / Navigation -->
      <div class="header__item subheader__header">
        <div class="header_fixed-background"></div>
        <div class="container">
          <div class="row">
            <div class="col-8 header-nav">
              <nav class="nav__box nav__box_1" aria-label="Primary">
                <div class="s-wrapper s-wrapper_original">
                  <div class="navigation__box">
                    {% include 'nav.html' %}
                  </div>
                </div>
              </nav>
            </div>
            <div class="col-4">
              <div class="slogan__wrapper">
                <div class="slogan">
                  <div class="slogan__container">
                    <i class="icon">
                      <svg><use href="#icons:16634"></use></svg>
                    </i>
                    <span>{{ company.discount }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile slogan (shown on small screens via media query) -->
    <div class="header__slogan slogan sloganCollapsed__wrapper hidden">
      <div class="container">
        <div class="slogan__wrapper">
          <div class="slogan">
            <div class="slogan__container">
              <i class="icon">
                <svg><use href="#icons:16634"></use></svg>
              </i>
              <span>{{ company.discount }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile nav slide-out panel (starts closed: inert + hidden from AT) -->
  <div id="mobile-nav" class="mobile-nav" inert aria-hidden="true">
    <button id="mobile-nav-close" class="mobile-nav__close" aria-label="Close menu">&times;</button>
    <nav aria-label="Mobile">
      <ul class="mobile-nav__links">
        <li{% if page.url == '/' %} class="active"{% endif %}><a href="/">Home</a></li>
        <li{% if page.url contains '/services/' %} class="active"{% endif %}><a href="/services/">Plumbing Services</a></li>
        <li{% if page.url == '/about-us/' %} class="active"{% endif %}><a href="/about-us/">About</a></li>
        <li{% if page.url == '/contact/' %} class="active"{% endif %}><a href="/contact/">Contact</a></li>
      </ul>
    </nav>
    <div class="mobile-nav__info">
      <a href="/contact/">{{ company.service_area_short }}</a>
      <a href="/contact/">Call Us Today!</a>
      <a href="tel:{{ company.phone_link }}">{{ company.phone_display }}</a>
    </div>
    <div class="mobile-nav__social">
      <a href="{{ company.social.facebook }}" aria-label="Facebook">
        <svg class="mobile-nav__social-icon"><use href="#icons:98468"></use></svg>
      </a>
    </div>
  </div>

  <script>
    (function () {
      var burger = document.getElementById('burger__box');
      var nav = document.getElementById('mobile-nav');
      var close = document.getElementById('mobile-nav-close');
      if (!burger || !nav) return;

      function openNav() {
        nav.classList.add('is-open');
        burger.classList.add('is-open');
        burger.setAttribute('aria-expanded', 'true');
        nav.removeAttribute('inert');
        nav.removeAttribute('aria-hidden');
        document.body.style.overflow = 'hidden';
        if (close) close.focus();
      }
      function closeNav() {
        nav.classList.remove('is-open');
        burger.classList.remove('is-open');
        burger.setAttribute('aria-expanded', 'false');
        nav.setAttribute('inert', '');
        nav.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        burger.focus();
      }

      burger.addEventListener('click', function () {
        if (nav.classList.contains('is-open')) { closeNav(); } else { openNav(); }
      });
      if (close) close.addEventListener('click', closeNav);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && nav.classList.contains('is-open')) { closeNav(); }
      });

      // The burger is a layout element on desktop but only functions as a menu
      // toggle at <=1024px. Keep it out of the tab order / AT tree on desktop
      // so it isn't a dead control there.
      var desktop = window.matchMedia('(min-width: 1025px)');
      function syncBurger() {
        if (desktop.matches) {
          if (nav.classList.contains('is-open')) closeNav();
          burger.setAttribute('tabindex', '-1');
          burger.setAttribute('aria-hidden', 'true');
        } else {
          burger.removeAttribute('tabindex');
          burger.removeAttribute('aria-hidden');
        }
      }
      syncBurger();
      desktop.addEventListener('change', syncBurger);
    })();
  </script>
</header>
